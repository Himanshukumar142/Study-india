version: '3.8'

services:
  # 1. MongoDB Database Container (Optional local instance, bypassed if external Atlas URI is specified)
  mongodb:
    image: mongo:6.0-jammy
    container_name: jn-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jn-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Authentication Microservice
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: jn-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
      - AUTH_PORT=5001
    networks:
      - jn-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/api/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 3. User & Admin Microservice
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: jn-user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
      - USER_PORT=5002
    networks:
      - jn-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/api/users/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 4. Content, Gamification & AI Microservice
  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    container_name: jn-content-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
      - CONTENT_PORT=5003
    networks:
      - jn-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/api/content/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 5. Centralized API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: jn-api-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - CONTENT_SERVICE_URL=http://content-service:5003
    networks:
      - jn-network
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 6. Edge Nginx Web Server & Frontend SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jn-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - jn-network
    depends_on:
      - api-gateway

volumes:
  mongo-data:
    driver: local

networks:
  jn-network:
    driver: bridge
